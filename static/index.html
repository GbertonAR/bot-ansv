<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Soporte ANSV</title>
  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
  <link rel="icon" href="/static/favicon.ico" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      overflow: hidden;
      background-color: #f5f8ff;
      color: #1a237e;
    }
    #app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }
    header {
      background-color: #0d47a1;
      color: white;
      text-align: center;
      padding: 1rem;
      font-size: 1.5rem;
      font-weight: bold;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
    }
    #main-content {
      display: flex;
      flex-grow: 1;
      overflow: hidden;
      flex-direction: column;
    }
    #sidebar {
      display: none;
      width: 100%;
      max-height: 0;
      background-color: white;
      overflow: hidden;
      border-bottom: 1px solid #e0e0e0;
      transition: all 0.3s ease-in-out;
    }
    #sidebar.active {
      display: flex;
      flex-direction: column;
      width: 280px;
      max-height: none;
      padding: 20px;
      border-bottom: none;
      border-right: 1px solid #e0e0e0;
    }
    #sidebar h2 {
      display: flex;
      align-items: center;
      font-size: 1.3rem;
      color: #1a237e;
      margin-bottom: 20px;
    }
    #sidebar p {
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: #4a148c;
    }
    #sidebar p strong {
      color: #1a237e;
    }
    #sidebar button {
      background-color: #2196f3;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 20px;
    }
    #sidebar button:hover {
      background-color: #1976d2;
    }
    #webchat-container {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      background-color: #f5f8ff;
    }
    #webchat {
      width: 100%;
      max-width: 700px;
      height: 100%;
      min-height: 400px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);
      border-radius: 8px;
      background: white;
      overflow: hidden;
    }
    #loading-message {
      font-family: "Segoe UI", sans-serif;
      color: #555;
      margin-top: 20px;
      font-size: 1.1rem;
      text-align: center;
    }
    #webchat.ready + #loading-message {
      display: none;
    }
    @media (min-width: 768px) {
      #main-content {
        flex-direction: row;
      }
      #sidebar {
        display: flex;
        width: 280px;
        max-height: none;
        padding: 20px;
      }
      #webchat-container {
        padding: 20px;
      }
    }
    .icon-person, .icon-location, .icon-id-card {
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div id="app-container">
    <header>🤖 Asistente de Soporte ANSV</header>
    <div id="main-content">
      <div id="sidebar">
        <h2>
          <svg class="icon-person" width="24" height="24" viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
          Mi Perfil
        </h2>
        <p><strong>Nombre:</strong> Invitado</p>
        <p>
          <svg class="icon-location" width="20" height="20" viewBox="0 0 24 24">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
          <strong>Provincia:</strong> Buenos Aires
        </p>
        <p>
          <svg class="icon-id-card" width="22" height="22" viewBox="0 0 24 24">
            <path d="M22 17H2c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2v-2c0-1.1-.9-2-2-2zm0-10H2c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2z"/>
          </svg>
          <strong>Municipio:</strong> La Plata
        </p>
        <button>Editar Perfil</button>
      </div>
      <div id="webchat-container">
        <div id="loading-message">Conectando con el asistente...</div>
        <div id="webchat" role="main"></div>
      </div>
    </div>
  </div>

  <script>
(async function () {
  try {
    const configResponse = await fetch('/chat-config');
    const config = await configResponse.json();

    const directLine = window.WebChat.createDirectLine({
      secret: config.directLineSecret
    });

    const styleOptions = {
        backgroundColor: '#f5f8ff',
        bubbleBackground: '#e0f7fa',
        bubbleFromUserBackground: '#e8f5e9',
        accent: '#007bff',
        sendBoxBackground: '#ffffff',
        sendBoxButtonColor: '#007bff',
        primaryFont: '"Segoe UI", sans-serif',
        rootHeight: '100%',
        rootWidth: '100%',
        sendBoxHeight: 48,
        sendBoxTextWrap: true,
        botAvatarImage: '/static/ansv_avatar.png',
        userAvatarImage: '/static/user_avatar.png',
        botAvatarInitials: 'BS',
        userAvatarInitials: 'TU',
        hideUploadButton: true
      };

      const store = window.WebChat.createStore({}, ({ dispatch }) => next => action => next(action));

      window.WebChat.renderWebChat({
        directLine,
        styleOptions,
        store,
        locale: 'es-ES',
        userID: 'usuario-invitado',
        username: 'Invitado',
      }, document.getElementById('webchat'));

      document.getElementById('webchat').classList.add('ready');
    } catch (err) {
      console.error('Error al cargar el Web Chat:', err);
      document.getElementById('loading-message').innerText = 'Error al conectar con el asistente.';
    }
    })();
  </script>
</body>
</html>
